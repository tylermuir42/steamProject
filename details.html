<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="View detailed information about a specific Steam game, including genres, release date, and store link."
  />
  <meta name="keywords" content="Steam, game details, Steam store, genres, release date" />
  <meta name="author" content="Your Name Here" />
  <meta name="application-name" content="Steam Playtime" />
  <meta name="theme-color" content="#1b2838" />
  <meta name="robots" content="index,follow" />

  <meta property="og:title" content="Game details — Steam Playtime" />
  <meta
    property="og:description"
    content="View details for a Steam game, including genres, release date, and a direct link to the Steam store page."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://example.com/details.html" />
  <meta property="og:image" content="https://example.com/preview.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Game details — Steam Playtime" />
  <meta
    name="twitter:description"
    content="View rich details for a Steam game, including genres, release date, and store link."
  />
  <meta name="twitter:image" content="https://example.com/preview.png" />
  <title>Game details — Steam Playtime</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div class="app">
    <header class="header">
      <h1>Steam Playtime</h1>
      <p class="tagline">Game details</p>
    </header>

    <main id="main" tabindex="-1">
      <section id="details" class="card" aria-label="Game details">
        <button id="back-btn" class="btn btn-ghost">&larr; Back to your games</button>

        <div id="details-loading" class="details-loading text-muted">
          Loading game details…
        </div>

        <section id="details-error" class="card error hidden" aria-label="Error">
          <p id="details-error-message" class="error-message"></p>
        </section>

        <div id="details-content" class="details-content hidden" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <p class="text-muted">Uses Steam Storefront data. Not affiliated with Valve.</p>
    </footer>
  </div>

  <script type="module" src="details.js"></script>
</body>
</html>
