<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Playtime — Team Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div class="app">
    <header class="header">
      <h1>Steam Playtime</h1>
      <p class="tagline">See how long you’ve spent in your games</p>
      <div id="auth-area">
        <a id="login-btn" class="btn btn-primary" href="#">Sign in with Steam</a>
        <div id="user-area" class="user-area hidden">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn btn-ghost">Sign out</button>
        </div>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <section id="welcome" class="card" aria-label="Welcome">
        <p class="text-muted">Sign in with Steam to view your library and playtime for each game.</p>
      </section>

      <section id="loading" class="card hidden" aria-label="Loading">
        <p class="loading-text text-muted">Loading your games…</p>
      </section>

      <section id="games-section" class="hidden" aria-label="Your games">
        <div class="games-summary">
          <h2>Your games</h2>
          <p id="total-playtime" class="total-playtime text-muted" aria-live="polite"></p>
        </div>
        <ul id="games-list" class="games-list" aria-label="Your games"></ul>
      </section>

      <section id="error" class="card error hidden" aria-label="Error">
        <p id="error-message" class="error-message"></p>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <p class="text-muted">Uses Steam Web API. Not affiliated with Valve.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
